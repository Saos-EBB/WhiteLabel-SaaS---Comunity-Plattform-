services:

  XXX_db:
    image: postgis/postgis:16-3.4
    container_name: XXX_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - XXX_pgdata:/var/lib/postgresql/data
    networks:
      - XXX_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: XXX_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - XXX_db
    networks:
      - XXX_network

  nestjs:
    build:
      context: .
    container_name: XXX_backend
    restart: unless-stopped
    environment:
      DB_HOST:     XXX_db
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - XXX_db
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - XXX_network

volumes:
  XXX_pgdata:

networks:
  XXX_network:
    driver: bridge