services:
  - type: web
    name: paarship-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        value: dpg-d8d1b0sp3tds73f2kipg-a.frankfurt-postgres.render.com
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: xxx_db_render
      - key: DB_USER
        value: xxx_db_render_user
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_SALT
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: APP_ENCRYPTION_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: STRIPE_RETURN_URL
        sync: false
