# =============================================================================
# demo-relations.yaml
# Seed-Definitionen: Beefs, Conversations, Messages, Contact Requests, Blocks
# Projekt: WhiteLabel-SaaS Community Platform
# Branch: feat/beef-game-system
# Stand: 2026-06-07
# =============================================================================
#
# STRUKTUR-ÜBERSICHT:
#   beefs            → 5 Beefs mit verschiedenen Status (zeigt die ganze State Machine)
#   contact_requests → Mix aus pending / accepted / declined (realistischer Posteingang)
#   conversations    → Chats für die 6 Hero-Accounts, lebendig + witzig
#   blocks           → Makima hat 3 User geblockt
#
# HERO-ACCOUNTS (einloggen für Demo):
#   saos43 | roro | gutz | gandalf | robin | makima
#   (Passwort: wie im bestehenden Demo-Seed gesetzt)
#
# NICKNAMES → IDs werden im Seed-Script per JOIN aufgelöst:
#   SELECT u.id FROM users u JOIN profiles p ON p.user_id = u.id WHERE p.nickname = $1
# =============================================================================


# -----------------------------------------------------------------------------
# BEEFS
# 5 Beefs mit verschiedenen Status — zeigt die ganze Bandbreite der State Machine:
#   pending_approval → noch nicht vom Admin abgesegnet
#   waiting          → Admin OK, Target hat noch nicht angenommen
#   active           → läuft gerade, ends_at in der Zukunft
#   closed           → vorbei, winner gesetzt
#   chickened        → jemand hat gekniffen (24h timeout)
# -----------------------------------------------------------------------------

beefs:

  # ---------------------------------------------------------------------------
  # BEEF 1: theMac vs theeagle — Pineapple on Pizza
  # Casting: theMac = Conor McGregor energy, theeagle = Khabib energy
  # Status: active — läuft gerade heiß
  # theMac hat gehört dass theeagle Ananas auf Pizza als Trash bezeichnet hat
  # und ist sofort ausgerastet. theeagle ist ruhig und absolut überzeugt.
  # ---------------------------------------------------------------------------
  - initiator: theMac
    target: theeagle
    tldr: "Pineapple on pizza: yes or no?"
    status: active
    admin_approved: true
    game_type: rps
    pot_coins: 75
    # ends_at wird im Script auf NOW() + 8h gesetzt
    chat_passage: |
      theMac: heard you said pineapple on pizza is trash. say it again.
      theeagle: I said what I said. pineapple does not belong on pizza. this is fact.
      theMac: FACT?? bro you eat the same three foods every day who are you to talk
      theeagle: I eat clean. I eat real food. pineapple on pizza is not real food. it is confusion on bread.
      theMac: confusion on bread 💀 you absolute animal
      theeagle: you cannot argue with me on this. you have no discipline. not in food, not in anything.
      theMac: oh we're doing this? we're DOING THIS? i will destroy you
      theeagle: you always talk. you never finish.
      theMac: i'm filing a beef. official. right now. let's go.
      theeagle: okay.

  # ---------------------------------------------------------------------------
  # BEEF 2: roro vs denji — Who handles 3 weapons better?
  # Casting: roro = Roronoa Zoro (King of Hell), denji = Denji (Chainsaw Man)
  # Status: waiting — Admin approved, denji hat noch nicht angenommen
  # denji dachte er sei der einzige mit 3 Waffen. Er lag falsch.
  # Makima-Simp Denji trifft auf jemanden dem das komplett egal ist.
  # ---------------------------------------------------------------------------
  - initiator: denji
    target: roro
    tldr: "Who handles 3 weapons better?"
    status: active
    admin_approved: true
    game_type: tictactoe
    pot_coins: 40
    # denji hat initiiert aber roro hat den Beef formell ausgerufen
    chat_passage: |
      denji: just to be clear. i am the hero of hell. three weapons. chainsaw, chainsaw, chainsaw.
      roro: ...those are the same weapon three times.
      denji: they're on different parts of my body so they count separately
      roro: I have three swords. they are all different. I am the King of Hell.
      denji: you can't be King of Hell i'm the Hero of Hell that's basically the same thing
      roro: it is not the same thing.
      denji: where even are you right now
      roro: ...north. I think.
      denji: YOU THINK??
      roro: I always end up where I need to be.
      denji: makima says real strength is about control not just swinging things around
      roro: who is makima
      denji: she's— she's just— she knows things okay
      roro: I cut King. I beat Kaido's right hand with Enma. I am filing a beef. come find me if you can.
      denji: I WILL FIND YOU
      roro: no you won't
      denji: ...no i won't but I ACCEPT

  # ---------------------------------------------------------------------------
  # BEEF 3: makima vs sylvanas — Whose pets are cuter?
  # Casting: makima = Makima (CSM), sylvanas = Sylvanas Windrunner (Warcraft)
  # Status: closed — makima hat gewonnen. Natürlich.
  # Sylvanas hat über ihre Wölfe gepostet. Makima konnte es nicht lassen.
  # Der CSM-Joke: Makimas "Hunde" sind keine normalen Hunde.
  # ---------------------------------------------------------------------------
  - initiator: makima
    target: sylvanas
    tldr: "Whose pets are cuter?"
    status: active
    admin_approved: true
    game_type: rps
    pot_coins: 120
    chat_passage: |
      makima: I saw your post about the wolves. cute.
      sylvanas: they are not cute. they are loyal. there is a difference.
      makima: mine are also very loyal.
      sylvanas: you have dogs. I command an army of undead and wolves who chose me.
      makima: chose. interesting word.
      sylvanas: what does that mean.
      makima: nothing. your wolves are beautiful by the way. very well behaved.
      sylvanas: ...why does that sound like a threat.
      makima: it isn't. I just appreciate obedience.
      sylvanas: I lead the Horde. I don't take compliments from someone whose pets follow her around a city park.
      makima: they follow me everywhere actually. not just the park.
      sylvanas: I'm filing a beef. let the community decide.
      makima: okay 😊
      sylvanas: stop smiling like that.
      makima: I'm not doing anything.

  # ---------------------------------------------------------------------------
  # BEEF 4: infowarrior vs robin — "She is a WITCH"
  # Casting: infowarrior = Alex Jones Type, robin = Nico Robin (One Piece)
  # Status: pending_approval — Admin muss noch approven
  # infowarrior wurde von gandalf getrollt und denkt Robin liest okkulte Schriften.
  # Die "okkulten Schriften" sind Poneglyphen. robin findet das amüsant.
  # Gut für Demo: gutz oder saos43 können live approven
  # ---------------------------------------------------------------------------
  - initiator: infowarrior
    target: robin
    tldr: "She is a WITCH (I have proof)"
    status: active
    admin_approved: true
    game_type: reaction
    pot_coins: 10
    # Absichtlich niedrige Coins — infowarrior ist broke und paranoid
    chat_passage: |
      infowarrior: I need to talk to you about something serious.
      robin: of course. what is it?
      infowarrior: I have it on good authority that you possess ancient occult scriptures. forbidden knowledge. the kind they don't want us to read.
      robin: ...who told you this.
      infowarrior: a very reliable source. goes by gandalf. wise man. knows things.
      robin: I see.
      infowarrior: he said you can READ them. the forbidden texts. that's not normal.
      robin: they're called Poneglyphs. they're historical records carved in stone. I study them academically.
      infowarrior: EXACTLY what a witch would say.
      robin: is it.
      infowarrior: the elite doesn't want us to know what's in those stones. you're either with them or you're a witch who works for them.
      robin: the Poneglyphs document the Void Century. a suppressed period of history. the World Government erased it deliberately.
      infowarrior: SEE?? suppressed history?? this is EXACTLY what I've been saying about the deep state and the moon landing and—
      robin: the moon landing was real.
      infowarrior: gandalf said you'd say that too.
      robin: gandalf is having fun at your expense.
      infowarrior: gandalf would never. he told me about the chemtrails AND the fluoride AND you.
      robin: I'm going to file a counter-beef just so there's an official record of this conversation.
      infowarrior: I KNEW IT. witches always go on the offensive when exposed.
      robin: I'm not on the offensive. I'm just curious what the community thinks.
      infowarrior: they'll see the truth. I have screenshots.
      robin: of what.
      infowarrior: your profile picture. you're standing in front of ruins.
      robin: that's Ohara. it's an archaeological site.
      infowarrior: OHARA?? that's not even a real place name that's a CODE.
      robin: how curious.
      infowarrior: why are you smiling like that
      robin: I'm not smiling. I'm simply enjoying the conversation.

  # ---------------------------------------------------------------------------
  # BEEF 5: 50cent vs diddydone — We need to talk about your parties
  # Casting: 50cent = 50 Cent, diddydone = P Diddy
  # Status: chickened — diddydone ist mid-conversation verschwunden
  # 50cent hat jahrelang auf Twitter geflammt. Jetzt offiziell.
