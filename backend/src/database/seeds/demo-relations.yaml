      diddydone: i was very dehydrated
      50cent: i'm dropping the documentary next week
      diddydone: okay look. i'm bigger than this. i'm focused on my comeback album. new era. positive energy only.
      50cent: what's the album called
      diddydone: ...Love
      50cent: 💀
      diddydone: it's about growth
      50cent: diddy i have the freak off invoices
      diddydone: i gotta go
      50cent: go WHERE


